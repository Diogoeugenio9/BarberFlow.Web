<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<div class="container">
  <div class="card">

    <div class="logo">
      BarberFlow
    </div>

    <h1>Bem-vindo 👋</h1>

    <p class="welcome-text">
      <!-- Gerencie sua barbearia de forma simples e organizada. -->
    </p>

    <div class="buttons" *ngIf="!isLoggedIn()">
      <button (click)="irParaLogin()">Login</button>
      <button (click)="irParaCadastro()">Cadastro</button>
    </div>

    <div class="buttons" *ngIf="isLoggedIn()">
      <button (click)="logout()">Sair</button>
    </div>

    <div class="menu">
      <h3>Menu</h3>

      <ul>
        <!-- <li>✂️ Barbeiros</li> -->
        <li (click)="irParaServices()">💈 Serviços</li>
        <li (click)="irParaAppointments()">📅 Agendamentos</li>
      </ul>
    </div>

    <div class="barbeiros">
  <h3>Nossos Barbeiros</h3>

  <div class="barbeiro-card" *ngFor="let barbeiro of barbeiros">

    <div class="avatar">
      💈
    </div>

    <div class="info">
      <h4>{{ barbeiro.name }}</h4>

      <p>
        <strong>Especialidade:</strong>
        {{ barbeiro.specialty }}
      </p>

      <button (click)="irParaServices()">Agendar</button>
    </div>

  </div>
</div>

  </div>
</div>
